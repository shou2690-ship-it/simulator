<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配送案件 収支シミュレーション</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a212b;
    --panel-2: #232c38;
    --border: #2d3846;
    --text: #e8eef5;
    --text-dim: #8a96a6;
    --accent: #4ade80;
    --danger: #f87171;
    --highlight: #fbbf24;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 32px; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif; line-height: 1.5; }
  .container { max-width: 980px; margin: 0 auto; }
  header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid var(--border); }
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  h1 { font-size: 26px; margin: 0 0 4px 0; font-weight: 700; letter-spacing: 0.02em; }
  .subtitle { color: var(--text-dim); font-size: 13px; }
  .header-btns { display: flex; gap: 8px; }
  .reset-btn { background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 7px 16px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: inherit; }
  .reset-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .settings-btn { background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 7px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: inherit; }
  .settings-btn:hover { color: var(--accent); border-color: var(--accent); }
  .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab { background: transparent; color: var(--text-dim); border: none; padding: 11px 20px; font-size: 15px; font-family: inherit; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px 32px; display: flex; flex-direction: column; }
  .card-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 24px; font-weight: 700; margin: 0 0 4px 0; color: var(--accent); }
  .card-hours { font-size: 13px; color: var(--text-dim); }
  .card-note { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .row { display: grid; grid-template-columns: 1fr 140px 160px; align-items: center; gap: 14px; padding: 8px 0; font-size: 15px; }
  .row.head { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 6px; border-bottom: 1px dashed var(--border); margin-bottom: 4px; }
  .row.head > div:nth-child(2), .row.head > div:nth-child(3) { text-align: right; }
  .label { color: var(--text); }
  input[type="number"] { width: 100%; padding: 7px 10px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 14px; text-align: right; font-family: inherit; -moz-appearance: textfield; }
  input[type="number"]:focus { outline: none; border-color: var(--accent); background: #1f2935; }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .calc { text-align: right; color: var(--text); font-variant-numeric: tabular-nums; font-size: 15px; }
  .calc.deduct { color: var(--danger); }
  .calc.add { color: var(--accent); font-weight: 600; }
  .divider { height: 1px; background: var(--border); margin: 10px 0; }
  .subtotal { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 14px; color: var(--text-dim); }
  .subtotal-value { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; font-size: 16px; }
  .total { margin-top: 18px; padding: 18px 0 6px; border-top: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: baseline; }
  .total-label { font-size: 16px; font-weight: 600; color: var(--text); }
  .total-value { font-size: 38px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .yen { font-size: 20px; margin-left: 4px; color: var(--text-dim); }
  .invoice-bar { display: flex; align-items: center; gap: 12px; margin-top: 12px; padding: 10px 14px; background: var(--panel-2); border-radius: 6px; border: 1px solid var(--border); }
  .invoice-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-right: auto; }
  .toggle { display: inline-flex; background: var(--bg); border-radius: 5px; padding: 3px; border: 1px solid var(--border); }
  .toggle button { background: transparent; color: var(--text-dim); border: none; padding: 6px 14px; font-size: 12.5px; cursor: pointer; border-radius: 3px; font-family: inherit; font-weight: 500; transition: all 0.15s; }
  .toggle button.active { background: var(--accent); color: var(--bg); font-weight: 700; }
  .toggle.warn button.active { background: var(--highlight); color: var(--bg); }
  .invoice-note { font-size: 12px; color: var(--highlight); margin-top: 6px; padding: 0 2px; min-height: 16px; }
  .rocket-section { background: var(--panel-2); border-radius: 6px; padding: 12px 16px; margin: 8px 0; }
  .rocket-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--highlight); margin-bottom: 8px; font-weight: 600; }

  /* === Admin overlay === */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; overflow: auto; padding: 40px 16px; }
  .admin-box { max-width: 600px; margin: 0 auto; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .admin-hd { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); }
  .admin-hd h2 { margin: 0; font-size: 17px; font-weight: 700; }
  .close-btn { background: transparent; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 2px; }
  .close-btn:hover { color: var(--text); }
  .admin-list { padding: 16px 20px 8px; }
  .a-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 8px; background: var(--panel-2); }
  .a-item-name { flex: 1; font-size: 14px; font-weight: 600; }
  .mode-badge { font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 700; white-space: nowrap; }
  .mode-badge.piece { background: rgba(74,222,128,.15); color: var(--accent); border: 1px solid rgba(74,222,128,.3); }
  .mode-badge.daily { background: rgba(96,165,250,.15); color: #60a5fa; border: 1px solid rgba(96,165,250,.3); }
  .mode-badge.rocket { background: rgba(251,191,36,.15); color: var(--highlight); border: 1px solid rgba(251,191,36,.3); }
  .a-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap; }
  .a-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .a-btn.del:hover { color: var(--danger); border-color: var(--danger); }
  .a-btn.primary { background: var(--accent); color: #0f1419; border-color: var(--accent); font-weight: 700; }
  .a-btn.primary:hover { opacity: .85; }
  .add-row { padding: 12px 20px 20px; }
  .admin-form { display: none; border-top: 1px solid var(--border); padding: 22px 24px; background: var(--panel-2); }
  .admin-form h3 { margin: 0 0 18px; font-size: 15px; font-weight: 700; color: var(--accent); }
  .f-row { display: grid; grid-template-columns: 150px 1fr; align-items: center; gap: 12px; margin-bottom: 11px; }
  .f-label { font-size: 13px; color: var(--text-dim); text-align: right; }
  .f-label.req::after { content: ' *'; color: var(--danger); }
  input[type="text"], input[type="password"] { width: 100%; padding: 7px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 14px; font-family: inherit; }
  input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: var(--accent); }
  .sec-title { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); margin: 18px 0 10px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .mode-sel { display: inline-flex; background: var(--bg); border-radius: 5px; padding: 3px; border: 1px solid var(--border); }
  .mode-sel button { background: transparent; color: var(--text-dim); border: none; padding: 5px 14px; font-size: 12.5px; cursor: pointer; border-radius: 3px; font-family: inherit; font-weight: 500; transition: all .15s; }
  .mode-sel button.active { background: var(--accent); color: var(--bg); font-weight: 700; }
  /* Password box */
  .pw-box { max-width: 340px; margin: 0 auto; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 32px; text-align: center; }
  .pw-box h2 { margin: 0 0 6px; font-size: 18px; }
  .pw-box p { color: var(--text-dim); font-size: 13px; margin: 0 0 20px; }
  .pw-err { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 18px; }

  @media (max-width: 768px) {
    body { padding: 12px; }
    .card { padding: 18px 16px; }
    .row { grid-template-columns: 1fr 100px 120px; gap: 8px; font-size: 13px; }
    .total-value { font-size: 28px; }
    .tab { padding: 9px 14px; font-size: 13px; }
    .f-row { grid-template-columns: 120px 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-row">
      <div>
        <h1>配送案件 収支シミュレーション</h1>
        <div class="subtitle">数値を入力するとリアルタイムで振込金額が反映されます</div>
      </div>
      <div class="header-btns">
        <button class="settings-btn" onclick="showGate()">⚙ 現場設定</button>
        <button class="reset-btn" onclick="resetAll()">初期値に戻す</button>
      </div>
    </div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <div id="cardArea"></div>
</div>

<!-- Password gate -->
<div class="overlay" id="gateOverlay">
  <div class="pw-box">
    <h2>⚙ 現場設定</h2>
    <p>管理者パスワードを入力してください</p>
    <input type="password" id="pwInput" placeholder="パスワード" style="text-align:center;"
      onkeydown="if(event.key==='Enter')submitPw()">
    <div class="pw-err" id="pwErr"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="a-btn" onclick="closeGate()" style="flex:1;">キャンセル</button>
      <button class="a-btn primary" onclick="submitPw()" style="flex:1;">ログイン</button>
    </div>
  </div>
</div>

<!-- Admin panel -->
<div class="overlay" id="adminOverlay">
  <div class="admin-box">
    <div class="admin-hd">
      <h2>⚙ 現場設定</h2>
      <button class="close-btn" onclick="closeAdmin()">×</button>
    </div>
    <div class="admin-list" id="adminList"></div>
    <div class="add-row">
      <button class="a-btn primary" onclick="startAdd()" style="width:100%;padding:10px 0;">＋ 新しい現場を追加</button>
    </div>
    <div class="admin-form" id="adminForm"></div>
  </div>
</div>

<script>
const ADMIN_PW  = 'cario2026';
const AUTHED_KEY = 'sim_admin_authed';
const STORE_KEY  = 'simulator_cases_v2';

const DEFAULT_CASES = [
  { id:'sagawa',      title:'佐川',         hours:'7:30〜20:00',             mode:'piece', unit:177,   count:150, days:24, royalty:15, invoice_registered:true, fees:{vehicle:30000,maint:5500,ins:30000,admin:10000,rosai:1500,kamotsu:2000} },
  { id:'yamato',      title:'ヤマト',        hours:'7:30〜20:00',             mode:'piece', unit:180,   count:150, days:22, royalty:15, invoice_registered:true, fees:{vehicle:30000,maint:5500,ins:30000,admin:10000,rosai:2000,kamotsu:1500} },
  { id:'askul',       title:'アスクル',      hours:'6:30〜16:00 or 18:00',    mode:'daily', daily:25000,          days:22, royalty:15, invoice_registered:true, fees:{vehicle:30000,maint:5500,ins:30000,admin:10000,rosai:1500,kamotsu:2000} },
  { id:'amazon',      title:'Amazon',       hours:'9:00〜19:00',             mode:'daily', daily:30000,          days:22, royalty:15, invoice_registered:true, fees:{vehicle:30000,maint:5500,ins:30000,admin:10000,rosai:1500,kamotsu:2000}, note:'9:00-12:30 Amazon / 13:00-15:10 hub / 15:30-19:00 Amazon / 19:30-22:00 hub' },
  { id:'sagawa_night',title:'佐川ナイト配',  hours:'17:00〜20:00',            mode:'piece', unit:90,    count:30,  days:22, royalty:15, invoice_registered:true, fees:{vehicle:30000,maint:5500,ins:30000,admin:10000,rosai:1500,kamotsu:2000} },
  { id:'amazon_hub',  title:'Amazon hub',   hours:'〜23:59',                 mode:'daily', daily:5000,           days:22, royalty:0,  invoice_registered:true, fees:{vehicle:0,maint:0,ins:0,admin:0,rosai:0,kamotsu:0} },
  { id:'rocket',      title:'ロケットナウ',  hours:'11:00〜15:00 / 17:00〜21:00', mode:'rocket', cycle1_base:3500,cycle1_count:14,cycle1_unit:880,cycle1_threshold:14, cycle2_base:3500,cycle2_count:35,cycle2_unit:880,cycle2_threshold:14, bonus:2000, days:22, royalty:15, invoice_registered:true, fees:{vehicle:30000,maint:5500,ins:30000,admin:10000,rosai:1500,kamotsu:2000} },
];

let cases = (() => {
  try { const s = localStorage.getItem(STORE_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_CASES));
})();

const feeLabels = { vehicle:'車両代', maint:'メンテナンスパック', ins:'任意保険', admin:'事務手数料', rosai:'労災保険', kamotsu:'貨物保険' };
let activeId = cases[0].id;
const fmt = n => Math.round(n).toLocaleString('ja-JP');

function persist() { localStorage.setItem(STORE_KEY, JSON.stringify(cases)); }

// ── Simulator core (unchanged) ──────────────────────────────────

function buildTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  cases.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (c.id === activeId ? ' active' : '');
    btn.textContent = c.title;
    btn.onclick = () => { activeId = c.id; render(); };
    tabs.appendChild(btn);
  });
}

function buildCard(c) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + c.id;
  const noteHtml = c.note ? `<div class="card-note">${c.note}</div>` : '';
  let inputsHtml = '';
  if (c.mode === 'piece') {
    inputsHtml = `
      <div class="row head"><div>項目</div><div>単価/個数</div><div>金額</div></div>
      <div class="row"><div class="label">単価(円/個・税込)</div><div><input type="number" data-case="${c.id}" data-field="unit" value="${c.unit}"></div><div class="calc">—</div></div>
      <div class="row"><div class="label">1日の配完個数</div><div><input type="number" data-case="${c.id}" data-field="count" value="${c.count}"></div><div class="calc" id="${c.id}-perday">—</div></div>
      <div class="row"><div class="label">稼働日数</div><div><input type="number" data-case="${c.id}" data-field="days" value="${c.days}"></div><div class="calc add" id="${c.id}-gross">—</div></div>`;
  } else if (c.mode === 'daily') {
    inputsHtml = `
      <div class="row head"><div>項目</div><div>日当/日数</div><div>金額</div></div>
      <div class="row"><div class="label">日当(円・税込)</div><div><input type="number" data-case="${c.id}" data-field="daily" value="${c.daily}"></div><div class="calc">—</div></div>
      <div class="row"><div class="label">稼働日数</div><div><input type="number" data-case="${c.id}" data-field="days" value="${c.days}"></div><div class="calc add" id="${c.id}-gross">—</div></div>`;
  } else if (c.mode === 'rocket') {
    inputsHtml = `
      <div class="rocket-section"><div class="rocket-section-title">サイクル① 11:00〜15:00</div>
        <div class="row"><div class="label">基本料(円/日)</div><div><input type="number" data-case="${c.id}" data-field="cycle1_base" value="${c.cycle1_base}"></div><div class="calc">—</div></div>
        <div class="row"><div class="label">件数(件/日)</div><div><input type="number" data-case="${c.id}" data-field="cycle1_count" value="${c.cycle1_count}"></div><div class="calc">—</div></div>
        <div class="row"><div class="label">超過単価(円/件)</div><div><input type="number" data-case="${c.id}" data-field="cycle1_unit" value="${c.cycle1_unit}"></div><div class="calc">—</div></div>
        <div class="row"><div class="label">基本料込み件数</div><div><input type="number" data-case="${c.id}" data-field="cycle1_threshold" value="${c.cycle1_threshold}"></div><div class="calc" id="${c.id}-c1day">—</div></div>
      </div>
      <div class="rocket-section"><div class="rocket-section-title">サイクル② 17:00〜21:00</div>
        <div class="row"><div class="label">基本料(円/日)</div><div><input type="number" data-case="${c.id}" data-field="cycle2_base" value="${c.cycle2_base}"></div><div class="calc">—</div></div>
        <div class="row"><div class="label">件数(件/日)</div><div><input type="number" data-case="${c.id}" data-field="cycle2_count" value="${c.cycle2_count}"></div><div class="calc">—</div></div>
        <div class="row"><div class="label">超過単価(円/件)</div><div><input type="number" data-case="${c.id}" data-field="cycle2_unit" value="${c.cycle2_unit}"></div><div class="calc">—</div></div>
        <div class="row"><div class="label">基本料込み件数</div><div><input type="number" data-case="${c.id}" data-field="cycle2_threshold" value="${c.cycle2_threshold}"></div><div class="calc" id="${c.id}-c2day">—</div></div>
      </div>
      <div class="row"><div class="label">達成ボーナス(円/サイクル)</div><div><input type="number" data-case="${c.id}" data-field="bonus" value="${c.bonus}"></div><div class="calc" id="${c.id}-bonusday">—</div></div>
      <div class="row"><div class="label">稼働日数</div><div><input type="number" data-case="${c.id}" data-field="days" value="${c.days}"></div><div class="calc add" id="${c.id}-gross">—</div></div>`;
  }
  const feesHtml = Object.keys(feeLabels).map(k => `
    <div class="row"><div class="label">${feeLabels[k]}</div><div><input type="number" data-case="${c.id}" data-field="fees.${k}" value="${c.fees[k]}"></div><div class="calc deduct">−¥${fmt(c.fees[k])}</div></div>`).join('');
  card.innerHTML = `
    <div class="card-header">
      <div class="card-title">${c.title}</div>
      <div class="card-hours">${c.hours}</div>
      ${noteHtml}
      <div class="invoice-bar">
        <span class="invoice-label">インボイス</span>
        <div class="toggle ${c.invoice_registered ? '' : 'warn'}" data-case="${c.id}">
          <button class="${c.invoice_registered ? 'active' : ''}" data-invoice="true">登録あり</button>
          <button class="${c.invoice_registered ? '' : 'active'}" data-invoice="false">登録なし</button>
        </div>
      </div>
      <div class="invoice-note" id="${c.id}-invoice-note"></div>
    </div>
    ${inputsHtml}
    <div class="subtotal"><span>売上合計</span><span class="subtotal-value" id="${c.id}-revenue">—</span></div>
    <div class="row"><div class="label">ロイヤリティ(%)</div><div><input type="number" data-case="${c.id}" data-field="royalty" value="${c.royalty}" step="0.1"></div><div class="calc deduct" id="${c.id}-royalty-amt">—</div></div>
    <div class="subtotal"><span>ロイヤリティ調整後</span><span class="subtotal-value" id="${c.id}-after-royalty">—</span></div>
    <div class="row" id="${c.id}-invoice-row" style="display:none;"><div class="label">インボイス未登録控除</div><div style="text-align:right;color:var(--text-dim);font-size:13px;">2%</div><div class="calc deduct" id="${c.id}-invoice-amt">—</div></div>
    <div class="divider"></div>
    ${feesHtml}
    <div class="total"><span class="total-label">稼働合計金額</span><span class="total-value" id="${c.id}-total">¥0<span class="yen"></span></span></div>`;
  return card;
}

function calc(c) {
  let revenue = 0;
  if (c.mode === 'piece') {
    revenue = c.unit * c.count * c.days;
    document.getElementById(c.id + '-perday').textContent = '¥' + fmt(c.unit * c.count);
    document.getElementById(c.id + '-gross').textContent  = '¥' + fmt(revenue);
  } else if (c.mode === 'daily') {
    revenue = c.daily * c.days;
    document.getElementById(c.id + '-gross').textContent = '¥' + fmt(revenue);
  } else if (c.mode === 'rocket') {
    const c1extra = Math.max(0, c.cycle1_count - c.cycle1_threshold) * c.cycle1_unit;
    const c2extra = Math.max(0, c.cycle2_count - c.cycle2_threshold) * c.cycle2_unit;
    const c1day = c.cycle1_base + c1extra;
    const c2day = c.cycle2_base + c2extra;
    const bonusDay = c.bonus * 2;
    revenue = (c1day + c2day + bonusDay) * c.days;
    document.getElementById(c.id + '-c1day').textContent    = '¥' + fmt(c1day)    + '/日';
    document.getElementById(c.id + '-c2day').textContent    = '¥' + fmt(c2day)    + '/日';
    document.getElementById(c.id + '-bonusday').textContent = '¥' + fmt(bonusDay) + '/日';
    document.getElementById(c.id + '-gross').textContent    = '¥' + fmt(revenue);
  }
  document.getElementById(c.id + '-revenue').textContent      = '¥' + fmt(revenue);
  const royaltyAmt  = revenue * (c.royalty / 100);
  document.getElementById(c.id + '-royalty-amt').textContent  = '−¥' + fmt(royaltyAmt);
  const afterRoyalty = revenue - royaltyAmt;
  document.getElementById(c.id + '-after-royalty').textContent = '¥' + fmt(afterRoyalty);
  const invoiceRow  = document.getElementById(c.id + '-invoice-row');
  const invoiceNote = document.getElementById(c.id + '-invoice-note');
  let invoiceDeduction = 0;
  if (!c.invoice_registered) {
    invoiceDeduction = afterRoyalty * 0.02;
    invoiceRow.style.display = 'grid';
    document.getElementById(c.id + '-invoice-amt').textContent = '−¥' + fmt(invoiceDeduction);
    invoiceNote.textContent = '⚠ インボイス未登録のため 2% を控除';
  } else {
    invoiceRow.style.display = 'none';
    invoiceNote.textContent = '';
  }
  Object.keys(feeLabels).forEach(k => {
    const el = document.querySelector(`#card-${c.id} input[data-field="fees.${k}"]`);
    if (el) { const d = el.parentElement.nextElementSibling; if (d) d.textContent = '−¥' + fmt(c.fees[k]); }
  });
  const feeSum = Object.values(c.fees).reduce((a, b) => a + b, 0);
  document.getElementById(c.id + '-total').innerHTML = '¥' + fmt(afterRoyalty - invoiceDeduction - feeSum) + '<span class="yen"></span>';
}

function handleInput(e) {
  const id = e.target.dataset.case, field = e.target.dataset.field;
  const val = parseFloat(e.target.value) || 0;
  const c = cases.find(x => x.id === id);
  if (!c) return;
  if (field.startsWith('fees.')) c.fees[field.split('.')[1]] = val;
  else c[field] = val;
  calc(c);
}

function handleInvoiceToggle(e) {
  if (!e.target.dataset.invoice) return;
  const toggle = e.target.closest('.toggle');
  const id = toggle.dataset.case;
  const newVal = e.target.dataset.invoice === 'true';
  const c = cases.find(x => x.id === id);
  if (!c) return;
  c.invoice_registered = newVal;
  toggle.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.invoice === String(newVal)));
  toggle.classList.toggle('warn', !newVal);
  calc(c);
}

function resetAll() {
  if (!confirm('初期値に戻しますか？（管理者が設定した現場は保持されます）')) return;
  // 現在の cases の値だけリセット（配列構造はそのまま）
  cases.forEach((c, i) => {
    const def = DEFAULT_CASES.find(d => d.id === c.id);
    if (def) Object.assign(c, JSON.parse(JSON.stringify(def)));
  });
  render();
}

function render() {
  buildTabs();
  const area = document.getElementById('cardArea');
  area.innerHTML = '';
  let c = cases.find(x => x.id === activeId);
  if (!c) { activeId = cases[0]?.id; c = cases[0]; }
  if (!c) return;
  area.appendChild(buildCard(c));
  area.querySelectorAll('input[type="number"]').forEach(inp => inp.addEventListener('input', handleInput));
  area.querySelectorAll('.toggle').forEach(t => t.addEventListener('click', handleInvoiceToggle));
  calc(c);
}

// ── Admin ────────────────────────────────────────────────────────

function showGate() {
  if (sessionStorage.getItem(AUTHED_KEY) === '1') { openAdmin(); return; }
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').textContent = '';
  document.getElementById('gateOverlay').style.display = 'block';
  setTimeout(() => document.getElementById('pwInput').focus(), 80);
}
function closeGate() { document.getElementById('gateOverlay').style.display = 'none'; }
function submitPw() {
  if (document.getElementById('pwInput').value === ADMIN_PW) {
    sessionStorage.setItem(AUTHED_KEY, '1');
    closeGate();
    openAdmin();
  } else {
    document.getElementById('pwErr').textContent = 'パスワードが違います';
    document.getElementById('pwInput').select();
  }
}

function openAdmin() {
  buildAdminList();
  document.getElementById('adminForm').style.display = 'none';
  document.getElementById('adminOverlay').style.display = 'block';
}
function closeAdmin() { document.getElementById('adminOverlay').style.display = 'none'; }

function buildAdminList() {
  const list = document.getElementById('adminList');
  list.innerHTML = '';
  cases.forEach((c, i) => {
    const modeText = c.mode === 'piece' ? '件数制' : c.mode === 'daily' ? '日給制' : 'ロケット';
    const div = document.createElement('div');
    div.className = 'a-item';
    div.innerHTML = `
      <span class="a-item-name">${c.title}</span>
      <span class="mode-badge ${c.mode}">${modeText}</span>
      <button class="a-btn" onclick="startEdit('${c.id}')">編集</button>
      <button class="a-btn del" onclick="deleteCase('${c.id}')">削除</button>
      <button class="a-btn" onclick="moveCase(${i},-1)" ${i===0?'disabled':''} style="padding:4px 8px;">↑</button>
      <button class="a-btn" onclick="moveCase(${i},1)"  ${i===cases.length-1?'disabled':''} style="padding:4px 8px;">↓</button>`;
    list.appendChild(div);
  });
}

let editingId  = null;
let formMode   = 'piece';

function startAdd()     { editingId = null; formMode = 'piece'; renderForm(null); }
function startEdit(id)  { editingId = id;   const c = cases.find(x=>x.id===id); formMode = c.mode; renderForm(c); }

function renderForm(c) {
  const form = document.getElementById('adminForm');
  form.style.display = 'block';
  const isEdit = !!c;

  const modeFields = () => {
    if (formMode === 'piece') return `
      <div class="sec-title">件数制の設定</div>
      <div class="f-row"><span class="f-label req">単価（円/個）</span><input type="number" id="f-unit"  value="${c&&c.mode==='piece'?c.unit:177}"></div>
      <div class="f-row"><span class="f-label req">1日の個数</span>    <input type="number" id="f-count" value="${c&&c.mode==='piece'?c.count:150}"></div>
      <div class="f-row"><span class="f-label">稼働日数（初期値）</span><input type="number" id="f-days"  value="${c?c.days:22}"></div>`;
    if (formMode === 'daily') return `
      <div class="sec-title">日給制の設定</div>
      <div class="f-row"><span class="f-label req">日当（円）</span>    <input type="number" id="f-daily" value="${c&&c.mode==='daily'?c.daily:25000}"></div>
      <div class="f-row"><span class="f-label">稼働日数（初期値）</span><input type="number" id="f-days"  value="${c?c.days:22}"></div>`;
    if (formMode === 'rocket') return `
      <div class="sec-title">サイクル① 設定</div>
      <div class="f-row"><span class="f-label">基本料（円/日）</span>  <input type="number" id="f-c1base"      value="${c.cycle1_base}"></div>
      <div class="f-row"><span class="f-label">件数（件/日）</span>    <input type="number" id="f-c1count"     value="${c.cycle1_count}"></div>
      <div class="f-row"><span class="f-label">超過単価（円/件）</span><input type="number" id="f-c1unit"      value="${c.cycle1_unit}"></div>
      <div class="f-row"><span class="f-label">基本料込み件数</span>   <input type="number" id="f-c1threshold" value="${c.cycle1_threshold}"></div>
      <div class="sec-title">サイクル② 設定</div>
      <div class="f-row"><span class="f-label">基本料（円/日）</span>  <input type="number" id="f-c2base"      value="${c.cycle2_base}"></div>
      <div class="f-row"><span class="f-label">件数（件/日）</span>    <input type="number" id="f-c2count"     value="${c.cycle2_count}"></div>
      <div class="f-row"><span class="f-label">超過単価（円/件）</span><input type="number" id="f-c2unit"      value="${c.cycle2_unit}"></div>
      <div class="f-row"><span class="f-label">基本料込み件数</span>   <input type="number" id="f-c2threshold" value="${c.cycle2_threshold}"></div>
      <div class="f-row"><span class="f-label">達成ボーナス（円/サイクル）</span><input type="number" id="f-bonus" value="${c.bonus}"></div>
      <div class="f-row"><span class="f-label">稼働日数（初期値）</span><input type="number" id="f-days"       value="${c.days}"></div>`;
    return '';
  };

  const defaultFee = k => k==='vehicle'?30000:k==='maint'?5500:k==='ins'?30000:k==='admin'?10000:k==='rosai'?1500:2000;

  form.innerHTML = `
    <h3>${isEdit ? '現場を編集' : '新しい現場を追加'}</h3>
    <div class="f-row"><span class="f-label req">案件名</span> <input type="text"   id="f-title" value="${c?c.title:''}"  placeholder="例: 楽天ネットスーパー"></div>
    <div class="f-row"><span class="f-label">時間帯</span>     <input type="text"   id="f-hours" value="${c?c.hours:''}"  placeholder="例: 9:00〜18:00"></div>
    <div class="f-row"><span class="f-label">メモ</span>       <input type="text"   id="f-note"  value="${c&&c.note?c.note:''}" placeholder="補足（任意）"></div>
    ${formMode !== 'rocket' ? `
    <div class="f-row">
      <span class="f-label req">種別</span>
      <div class="mode-sel">
        <button id="btn-piece" onclick="switchMode('piece')" class="${formMode==='piece'?'active':''}">件数制</button>
        <button id="btn-daily" onclick="switchMode('daily')" class="${formMode==='daily'?'active':''}">日給制</button>
      </div>
    </div>` : '<div style="font-size:12px;color:var(--highlight);padding:6px 0;">※ ロケットナウ専用の複合計算モードです</div>'}
    <div id="modeFields">${modeFields()}</div>
    <div class="sec-title">ロイヤリティ・経費</div>
    <div class="f-row"><span class="f-label">ロイヤリティ（%）</span><input type="number" id="f-royalty" value="${c?c.royalty:15}" step="0.1"></div>
    ${Object.keys(feeLabels).map(k=>`
    <div class="f-row"><span class="f-label">${feeLabels[k]}</span><input type="number" id="f-fee-${k}" value="${c?c.fees[k]:defaultFee(k)}"></div>`).join('')}
    <div class="form-actions">
      <button class="a-btn" onclick="cancelForm()">キャンセル</button>
      <button class="a-btn primary" onclick="saveForm()">保存する</button>
    </div>`;

  form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function switchMode(mode) {
  formMode = mode;
  document.getElementById('btn-piece').classList.toggle('active', mode === 'piece');
  document.getElementById('btn-daily').classList.toggle('active', mode === 'daily');
  const c = editingId ? cases.find(x => x.id === editingId) : null;
  // re-render only the mode fields section
  const mf = document.getElementById('modeFields');
  const days = document.getElementById('f-days')?.value || '22';
  if (mode === 'piece') {
    mf.innerHTML = `
      <div class="sec-title">件数制の設定</div>
      <div class="f-row"><span class="f-label req">単価（円/個）</span><input type="number" id="f-unit"  value="${c&&c.mode==='piece'?c.unit:177}"></div>
      <div class="f-row"><span class="f-label req">1日の個数</span>    <input type="number" id="f-count" value="${c&&c.mode==='piece'?c.count:150}"></div>
      <div class="f-row"><span class="f-label">稼働日数（初期値）</span><input type="number" id="f-days"  value="${days}"></div>`;
  } else {
    mf.innerHTML = `
      <div class="sec-title">日給制の設定</div>
      <div class="f-row"><span class="f-label req">日当（円）</span>    <input type="number" id="f-daily" value="${c&&c.mode==='daily'?c.daily:25000}"></div>
      <div class="f-row"><span class="f-label">稼働日数（初期値）</span><input type="number" id="f-days"  value="${days}"></div>`;
  }
}

function gv(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function gn(id) { const el = document.getElementById(id); return el ? (parseFloat(el.value) || 0) : 0; }

function saveForm() {
  const title = gv('f-title');
  if (!title) { alert('案件名を入力してください'); return; }

  const fees = {};
  Object.keys(feeLabels).forEach(k => { fees[k] = gn('f-fee-' + k); });

  let data = { title, hours: gv('f-hours'), mode: formMode, royalty: gn('f-royalty'), invoice_registered: true, fees };
  const note = gv('f-note'); if (note) data.note = note;

  if (formMode === 'piece') {
    Object.assign(data, { unit: gn('f-unit'), count: gn('f-count'), days: gn('f-days') || 22 });
  } else if (formMode === 'daily') {
    Object.assign(data, { daily: gn('f-daily'), days: gn('f-days') || 22 });
  } else if (formMode === 'rocket') {
    Object.assign(data, {
      cycle1_base: gn('f-c1base'), cycle1_count: gn('f-c1count'), cycle1_unit: gn('f-c1unit'), cycle1_threshold: gn('f-c1threshold'),
      cycle2_base: gn('f-c2base'), cycle2_count: gn('f-c2count'), cycle2_unit: gn('f-c2unit'), cycle2_threshold: gn('f-c2threshold'),
      bonus: gn('f-bonus'), days: gn('f-days') || 22,
    });
  }

  if (editingId) {
    const idx = cases.findIndex(x => x.id === editingId);
    if (idx >= 0) { data.id = editingId; cases[idx] = data; }
  } else {
    data.id = 'custom_' + Date.now();
    cases.push(data);
    activeId = data.id;
  }

  persist();
  buildAdminList();
  cancelForm();
  render();
}

function cancelForm() {
  const form = document.getElementById('adminForm');
  form.style.display = 'none';
  editingId = null;
}

function deleteCase(id) {
  if (cases.length <= 1) { alert('最低1つの現場が必要です'); return; }
  const c = cases.find(x => x.id === id);
  if (!confirm(`「${c?.title}」を削除しますか？`)) return;
  const idx = cases.findIndex(x => x.id === id);
  cases.splice(idx, 1);
  if (activeId === id) activeId = cases[0].id;
  persist();
  buildAdminList();
  render();
}

function moveCase(idx, dir) {
  const ni = idx + dir;
  if (ni < 0 || ni >= cases.length) return;
  [cases[idx], cases[ni]] = [cases[ni], cases[idx]];
  persist();
  buildAdminList();
  render();
}

render();
</script>
</body>
</html>
